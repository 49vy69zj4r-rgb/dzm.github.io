<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fdf6f3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>给妈妈的礼物</title>
<link rel="stylesheet" href="styles.css" />

<!-- 背景音乐代码 -->
<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">


</head>
<body>
<div class="petals" aria-hidden="true"></div>
<header class="hero">
<p class="hero-tag">今天想认真说一次</p>
<h1 class="hero-title">妈妈，<br />母亲节快乐</h1>
<p class="hero-sub">谢谢你一直在我身边，可怜天下父母心</p>
<button type="button" class="btn-heart" id="btnHeart" aria-label="送出一颗爱心"><span class="btn-heart-inner">点这里，收下我的心意</span></button>
<div class="heart-rain" id="heartRain" aria-hidden="true"></div>
</header>
<main>
<section class="card letter">
<h2>一封信</h2>
<p class="letter-intro">下面这些字，你可以按你们家的语气改一改——重要的是，这是<strong>你</strong>想说的话。</p>
<div class="letter-body">
<p>妈妈，</p>
<p>平时有些话不好意思当面说，今天借这个小页面告诉你：我很爱你，也很感激你，母亲节快乐。</p>
<p>希望你以后也多为自己着想，少累一点，多开心一点。</p>
<p>愿你健康、平安，每天都能睡个好觉。</p>
<p class="signature">—— 永远爱你的铭<br /><span class="editable-hint"></span></p>
</div>
</section>
<section class="card memories">
<h2>我们的瞬间</h2>
<div class="photo-grid">
<figure class="photo">
  <img src="mom1.jpg.jpg" alt="和爸妈在公园" width="600" height="600" loading="lazy" />
  <figcaption>谁言寸草心，报得三春晖。</figcaption>
</figure>
<figure class="photo">
  <img src="mom2.jpg.jpg" alt="和爸妈在景区" width="600" height="600" loading="lazy" />
  <figcaption>慈母倚门情，游子行路苦。</figcaption>
</figure>
<figure class="photo">
  <img src="mom3.jpg.jpg" alt="和爸妈在爬山" width="600" height="600" loading="lazy" />
  <figcaption>爱子心无尽，归家喜及辰</figcaption>
</figure>
</div>
</section>
<section class="card wishes">
<h2>三个小愿望</h2>
<ul class="wish-list">
<li><span class="wish-num">1</span>希望你身体健康，少些劳累</li>
<li><span class="wish-num">2</span>希望发大财，不用整天操心</li>
<li><span class="wish-num">3</span>你开心，我就很满足</li>
</ul>
</section>
<section class="card closing">
<p class="closing-line">妈妈，点开这个页面的那一刻，<br />你就已经收到礼物了。</p>
<p class="closing-small">因为最好的礼物，是有人把你放在心上。</p>
</section>
</main>
<footer class="footer"><p>用心做的 · 只给你看</p></footer>
<script src="script.js"></script>
</body>
</html>
